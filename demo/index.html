<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');

    :root {
      --board-colour: #fa6b20;
      font-family: "Outfit", Arial, sans-serif;
    }

    body {
      background: var(--background);
      height: 100vh;
      width: 100vw;
      margin: 0;
    }

    #demo {
      height: 100%;
      width: 100%;
    }

    se-footer {
      width: 100%;
      display: block;
    }

    se-nav {
      display: inline-block;
      width: 100%;
      background: #fa6b20;
      height: 5rem;
    }

    se-header {
      width: 100%;
      height: 300px;
      display: inline-block;
    }
  </style>
  <link rel="stylesheet" href="../dist/lib/styles/styles.css" />
</head>
<body>
  <div id="demo"></div>

  <script type="module">
    import { html, render } from 'lit';
    import '../dist/lib/index.js';

    const menus = [
      { title: "Home", to: "/" },
      { title: "Vereniging", submenu: [
          { title: "Activiteiten", to: "/vereniging/activiteiten" },
          { title: "Bestuur", to: "/vereniging/bestuur" },
          { title: "Commissies", to: "/vereniging/commissies" },
          { title: "Contact", to: "/vereniging/contact" }
      ] },
      { title: "Studie", submenu: [
          { title: "Medezeggenschap", to: "/studie/medezeggenschap" },
          { title: "OER", to: "/studie/oer" },
          { title: "Boekverkoop", to: "https://svsticky.nl/boeken" }
      ] },
      { title: "Carriere", submenu: [
          { title: "Partners", to: "/carriere/partners" },
          { title: "Samenwerking", to: "/carriere/samenwerking" },
          { title: "Vacatures", to: "/carriere/vacatures" }
      ] },
      { title: "Koala", to: "https://koala.svsticky.nl", type: "button" },
      { title: "Word lid", to: "https://wordlid.svsticky.nl", type: "button" }
    ];

    const slides = [
      { link: "https://picsum.photos/id/25/1080/1920", alt: "Alt 1", title: "Title 1" },
      { link: "https://picsum.photos/id/29/1080/1920", alt: "Alt 2", title: "Title 2" },
      { link: "https://picsum.photos/id/37/1080/1920", alt: "Alt 3", title: "Title 3" },
      { link: "https://picsum.photos/id/49/1080/1920", alt: "Alt 4", title: "Title 4" },
      { link: "https://picsum.photos/id/57/1080/1920", alt: "Alt 5", title: "Title 5" },
      { link: "https://picsum.photos/id/65/1080/1920", alt: "Alt 6", title: "Title 6" },
    ]


    render(
      html`
        <se-nav menus=${JSON.stringify(menus)}></se-nav>
        <se-header slides=${JSON.stringify(slides)}>
          <h1 style="color: white">Title</h1>
          <p style="color: white">Lorem ipsum dolor sit amet consectetur adipisicing elit. Delectus deserunt aperiam labore eaque nemo nihil corrupti provident aliquid minus quasi? Quidem perspiciatis, dolores laborum laudantium libero enim et temporibus optio!</p>
        </se-header>
        <se-footer></se-footer>
      `,
      document.querySelector('#demo')
    );
  </script>
</body>
</html>
